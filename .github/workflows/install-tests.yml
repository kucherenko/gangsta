name: Install Tests

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  manifest-validation:
    name: Validate plugin.json schema
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install jsonschema
        run: pip install --quiet jsonschema

      - name: Validate manifest
        run: bash scripts/validate-manifest.sh

  install-matrix:
    name: ${{ matrix.agent }} install
    runs-on: ubuntu-latest
    needs: manifest-validation
    strategy:
      fail-fast: false
      matrix:
        agent:
          - claude-code
          - opencode
          - codex
          - gemini
          - skills
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build ${{ matrix.agent }} test image
        uses: docker/build-push-action@v6
        with:
          context: tests/install
          file: tests/install/Dockerfile.${{ matrix.agent }}
          load: true
          tags: gangsta-test-${{ matrix.agent }}:ci
          cache-from: type=gha,scope=${{ matrix.agent }}
          cache-to: type=gha,scope=${{ matrix.agent }},mode=max

      - name: Run install test
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/plugin:ro" \
            -e OPENROUTER_API_KEY \
            -e OPENROUTER_MODEL \
            gangsta-test-${{ matrix.agent }}:ci
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL }}
